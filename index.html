<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andi Store Sepatu - Premium Fashion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>ANDI STORE SEPATU</h1>
        <p style="margin-top: 5px; opacity: 0.8;">Platform E-Commerce Sepatu & Fashion Premium</p>
    </header>

    <div class="store-container">
        <div class="profile-card">
            <img src="https://images.pexels.com/photos/7620548/pexels-photo-7620548.jpeg?auto=compress&cs=tinysrgb&w=150" alt="Logo Toko">
            <div>
                <h1>Andi Store Sepatu (Official)</h1>
                <p>Menyediakan berbagai macam pilihan produk fashion, sneaker, dan aksesoris olahraga dengan jaminan kualitas terbaik serta pengiriman instan.</p>
            </div>
        </div>

        <h2 class="section-title">Katalog 8 Produk Pilihan</h2>
        <div id="katalog-produk" class="katalog-grid"></div>

        <h2 class="section-title" style="margin-top: 40px;">Sistem Checkout & Pembayaran</h2>
        <div id="keranjang-payment" class="cart-section"></div>
    </div>

    <script src="toko.js"></script>
</body>
</html>
